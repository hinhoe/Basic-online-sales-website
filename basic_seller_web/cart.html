<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;font-family:Inter}
body{background:#f3f5f7}
.topbar{background:#1f6ed4;color:white;padding:15px 30px;font-size:22px;font-weight:700}
.container{padding:40px}
table{width:100%;background:white;border-radius:12px;border-collapse:collapse}
th,td{padding:15px;border-bottom:1px solid #eee;text-align:center}
.total{margin-top:20px;font-size:22px;font-weight:700;text-align:right}
button{padding:12px 25px;background:#e53935;color:white;border:none;border-radius:10px;margin-top:20px;float:right}
</style>
</head>

<body>
<div class="topbar">Giỏ hàng</div>

<div class="container">
    <table>
        <tr>
            <th>Sản phẩm</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tổng</th>
        </tr>
        <tr>
            <td>Premium Account</td>
            <td>299.000đ</td>
            <td>1</td>
            <td>299.000đ</td>
        </tr>
    </table>

    <div class="total">Tổng tiền: 299.000đ</div>
    <button>Thanh toán</button>
</div>
</body>
</html>

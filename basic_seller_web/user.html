<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài khoản của tôi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#f4f6f8}

/* HEADER */
.topbar{
    background:#1f6ed4;
    color:white;
    padding:15px 30px;
    font-size:22px;
    font-weight:700;
}

/* LAYOUT */
.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    display:flex;
    gap:25px;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
}
.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
}
.menu{
    margin-top:25px;
    text-align:left;
}
.menu div{
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}
.menu div:hover{background:#f0f3f8}

/* CONTENT */
.content{
    flex:1;
    background:white;
    padding:30px;
    border-radius:15px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0 20px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    padding:12px 25px;
    border:none;
    background:#1f6ed4;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
/* LOGOUT MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
    animation: popup 0.3s ease;
}

.modal-buttons{
    margin-top:20px;
    display:flex;
    justify-content:space-around;
}

.modal-buttons button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4CAF50;
    color:white;
}

.modal-buttons .cancel{
    background:red;
}

@keyframes popup{
    from{transform:scale(0.7); opacity:0;}
    to{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div class="topbar">Tài khoản của tôi</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img class="avatar" src="https://picsum.photos/200">
        <h3 id="displayName">User Demo</h3>
        <p id="displayEmail">demo@email.com</p>

        <div class="menu">
            <div onclick="showTab('profile')">👤 Thông tin cá nhân</div>
            <div onclick="showTab('orders')">📦 Đơn hàng</div>
            <div onclick="showTab('password')">🔒 Đổi mật khẩu</div>
            <div onclick="logout()">🚪 Đăng xuất</div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- PROFILE -->
        <div id="profileTab">
            <h2>Chỉnh sửa thông tin</h2>
            <label>Họ tên</label>
            <input id="name" placeholder="Nhập họ tên">

            <label>Email</label>
            <input id="email" placeholder="Nhập email">

            <button onclick="saveProfile()">Lưu thay đổi</button>
        </div>

        <!-- ORDERS -->
        <div id="ordersTab" style="display:none">
            <h2>Lịch sử đơn hàng</h2>
            <p>Bạn chưa có đơn hàng nào (demo).</p>
        </div>

        <!-- PASSWORD -->
        <div id="passwordTab" style="display:none">
            <h2>Đổi mật khẩu</h2>
            <input placeholder="Mật khẩu cũ">
            <input placeholder="Mật khẩu mới">
            <button>Đổi mật khẩu</button>
        </div>

    </div>

</div>

<script>
/* LOAD DATA */
window.onload=function(){
    let name=localStorage.getItem("name") || "User Demo";
    let email=localStorage.getItem("email") || "demo@email.com";

    document.getElementById("displayName").innerText=name;
    document.getElementById("displayEmail").innerText=email;

    document.getElementById("name").value=name;
    document.getElementById("email").value=email;
}

/* SAVE PROFILE */
function saveProfile(){
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;

    localStorage.setItem("name",name);
    localStorage.setItem("email",email);

    alert("Đã lưu!");
    location.reload();
}

/* TABS */
function showTab(tab){
    document.getElementById("profileTab").style.display="none";
    document.getElementById("ordersTab").style.display="none";
    document.getElementById("passwordTab").style.display="none";

    document.getElementById(tab+"Tab").style.display="block";
}

/* LOGOUT DEMO */
function logout(){
    document.getElementById("logoutModal").style.display = "flex";
}

function closeLogoutModal(){
    document.getElementById("logoutModal").style.display = "none";
}

function confirmLogout(){
    window.location.href = "homepage.html";
}


</script>

<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal">
  <div class="modal-content">
      <h3>Bạn có chắc muốn đăng xuất?</h3>
      <div class="modal-buttons">
          <button onclick="confirmLogout()">Đăng xuất</button>
          <button class="cancel" onclick="closeLogoutModal()">Hủy</button>
      </div>
  </div>
</div>
</body>
</html>

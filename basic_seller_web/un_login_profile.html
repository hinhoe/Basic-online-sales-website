<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

/* WRAP */
.wrapper{
    display:flex;
    gap:40px;
    justify-content:center;
    align-items:center;
    width:100%;
}

/* ===== NOTICE ===== */
.notice-box{
    width:600px;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.notice-title{
    font-size:20px;
    font-weight:700;
    color:#0f8b8d;
    margin-bottom:15px;
    border-bottom:2px solid #eee;
    padding-bottom:10px;
}

.notice-item{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.notice-item h4{
    color:#0f8b8d;
    font-size:14px;
}

.notice-item span{
    font-size:12px;
    color:#777;
}

.notice-item a{
    float:right;
    color:red;
    font-size:12px;
    text-decoration:none;
}

/* ===== LOGIN ===== */
.login-box{
    width:320px;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TAB */
.tabs{
    display:flex;
    margin-bottom:20px;
    position:relative;
}

/* TAB CHUNG */
.tab{
    flex:1;
    text-align:center;
    padding:12px 0;
    cursor:pointer;
    background:#e5e7eb;
    color:#999;
    font-weight:500;
    transition:0.25s;
}

/* TAB TRÁI */
.tab:first-child{
    clip-path:polygon(0 0, 100% 0, 90% 100%, 0% 100%);
}

/* TAB PHẢI */
.tab:last-child{
    clip-path:polygon(10% 0, 100% 0, 100% 100%, 0 100%);
    margin-left:-20px; /* kéo chồng lên */
}

/* ACTIVE */
.tab.active{
    background:white;
    color:#000;
    font-size:20px;
    font-weight:700;
    z-index:2;
    transform:scale(1.05);
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}


/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#0f8b8d;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
}

/* ERROR */
.error{
    color:red;
    font-size:13px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="notice-box">
        <div class="notice-title">THÔNG BÁO CHUNG</div>

        <div class="notice-item">
            <h4>Thông báo</h4>
            <span>06/03/2026</span>
            <a href="#">Xem chi tiết</a>
        </div>

        <div class="notice-item">
            <h4>Thông báo</h4>
            <span>09/02/2026</span>
            <a href="#">Xem chi tiết</a>
        </div>

        <div class="notice-item">
            <h4>Thông báo</h4>
            <span>23/01/2026</span>
            <a href="#">Xem chi tiết</a>
        </div>

        <div class="notice-item">
            <h4>Thông báo</h4>
            <span>13/01/2026</span>
            <a href="#">Xem chi tiết</a>
        </div>

        <div class="notice-item">
            <h4>Thông báo</h4>
            <span>31/12/2025</span>
            <a href="#">Xem chi tiết</a>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="login-box">

        <div class="tabs">
            <div class="tab active" onclick="selectTab(event,'user')">User</div>
            <div class="tab" onclick="selectTab(event,'admin')">Admin</div>
        </div>

        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">

        <button onclick="login()">Đăng nhập</button>

        <div id="error" class="error"></div>

    </div>

</div>

<script>
let role = "user";

function selectTab(e, r){
    role = r;

    document.querySelectorAll(".tab").forEach(t=>{
        t.classList.remove("active");
    });

    e.target.classList.add("active");
}

function login(){
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;
    let err = document.getElementById("error");

    if(u === "" || p === ""){
        err.innerText = "Vui lòng hãy nhập đầy đủ!";
        return;
    }

    // chia theo tab đang chọn
    if(role === "user"){
        window.location.href = "user.html";
    } else if(role === "admin"){
        window.location.href = "admin.html";
    }
}
</script>

</body>
</html>

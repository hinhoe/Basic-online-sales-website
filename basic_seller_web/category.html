<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh mục</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#f3f5f7}
.topbar{background:#1f6ed4;color:#fff;padding:15px 30px;font-weight:700;font-size:22px}
.container{padding:30px}
.products{display:grid;grid-template-columns:repeat(5,1fr);gap:20px}
.card{background:white;padding:15px;border-radius:12px;text-align:center}
.card img{width:100%;border-radius:10px}
.price{color:red;font-weight:700}
button{margin-top:10px;padding:8px 12px;border:none;background:#1f6ed4;color:white;border-radius:8px}
</style>
</head>

<body>
<div class="topbar">Danh mục sản phẩm</div>

<div class="container">
    <div class="products">
        <!-- lặp demo -->
        <script>
            for(let i=1;i<=15;i++){
                document.write(`
                <div class="card">
                    <img src="https://picsum.photos/200?${i}">
                    <h4>Sản phẩm ${i}</h4>
                    <div class="price">${100+i*20}.000đ</div>
                    <button onclick="location.href='product.html'">Xem</button>
                </div>`)
            }
        </script>
    </div>
</div>
</body>
</html>
